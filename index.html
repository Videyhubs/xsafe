<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XSafe ELITE Dashboard</title>

  <style>
    body { font-family: Arial; background:#0f172a; color:#fff; margin:0; }
    header { background:#020617; padding:15px; text-align:center; }
    .container { padding:20px; }
    input, button { padding:10px; margin:5px; border-radius:8px; border:none; }
    input { width:60%; }
    button { background:#22c55e; color:white; cursor:pointer; }
    .card { background:#1e293b; padding:15px; margin-top:15px; border-radius:12px; }
  </style>
</head>

<body>

<header>
  <h1>🚀 XSafe ELITE Dashboard</h1>
</header>

<div class="container" id="app"></div>

<script>

// ==============================
// SIMPLE AUTH (PIN LOGIN)
// ==============================
const PIN = "1234";

function loginUI(){
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>🔐 Enter PIN</h2>
      <input id="pin" type="password" placeholder="Enter PIN">
      <br>
      <button onclick="login()">Login</button>
    </div>
  `;
}

function login(){
  const input = document.getElementById('pin').value;
  if(input === PIN){
    localStorage.setItem('auth', true);
    dashboard();
  } else {
    alert('Wrong PIN');
  }
}


// ==============================
// DASHBOARD
// ==============================
function dashboard(){
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>Create Safe Link</h2>
      <input id="url" placeholder="Enter URL">
      <button onclick="generateLink()">Generate</button>
      <div id="result"></div>
    </div>

    <div class="card">
      <h2>📊 Link Statistics</h2>
      <div id="stats"></div>
    </div>
  `;

  loadStats();
}


// ==============================
// GENERATE LINK
// ==============================
function generateLink(){
  const url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  const code = btoa(url + Date.now()).substring(0,10);
  const short = window.location.origin + '/xsafe/#' + code;

  localStorage.setItem(code, JSON.stringify({
    url: url,
    clicks: 0,
    created: new Date().toLocaleString()
  }));

  document.getElementById('result').innerHTML = `
    <p>${short}</p>
  `;

  loadStats();
}


// ==============================
// LOAD STATS
// ==============================
function loadStats(){
  let html = "";

  for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);

    if(key === 'auth') continue;

    const data = JSON.parse(localStorage.getItem(key));

    html += `
      <div class="card">
        <p><b>Short:</b> ${window.location.origin}/xsafe/#${key}</p>
        <p><b>Clicks:</b> ${data.clicks}</p>
        <p><b>Created:</b> ${data.created}</p>
      </div>
    `;
  }

  document.getElementById('stats').innerHTML = html;
}


// ==============================
// BOT DETECTION
// ==============================
function isBot(){
  return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
}


// ==============================
// REDIRECT SYSTEM
// ==============================
window.onload = function(){

  const hash = window.location.hash.replace('#','');

  // REDIRECT MODE
  if(hash){
    const data = JSON.parse(localStorage.getItem(hash));

    if(!data) return;

    if(isBot()){
      document.body.innerHTML = "<h2>Content unavailable</h2>";
      return;
    }

    data.clicks++;
    localStorage.setItem(hash, JSON.stringify(data));

    document.body.innerHTML = `
      <div class="card">
        <h2>Loading secure page...</h2>
        <p id="count"></p>
      </div>
    `;

    let t = 5;
    const timer = setInterval(()=>{
      document.getElementById('count').innerText = "Redirect in " + t + " sec";
      t--;
      if(t < 0){
        clearInterval(timer);
        window.location.href = data.url;
      }
    },1000);

    return;
  }

  // LOGIN OR DASHBOARD
  if(localStorage.getItem('auth')){
    dashboard();
  } else {
    loginUI();
  }
}

</script>
