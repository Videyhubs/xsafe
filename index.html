<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe Shortlink</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:20px;margin-top:20px}
input,textarea,button{padding:12px;margin:8px;border-radius:10px;border:none}
input,textarea{width:100%}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>
<div id="app"></div>

<script>

// ==============================
// BOT DETECTION (CLOAKING)
// ==============================
function isBot(){
  return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp|bot|crawl|spider/i.test(navigator.userAgent);
}

// ==============================
// UNIQUE CODE
// ==============================
function uniqueCode(){
  const arr = new Uint8Array(12);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,14);
}

// ==============================
// REAL ARTICLE API
// ==============================
async function fetchArticle(){
  try{
    const res = await fetch('https://api.allorigins.win/raw?url=https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml');
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");
    const items = xml.querySelectorAll("item");

    if(!items || items.length === 0) throw new Error('No items');

    const random = items[Math.floor(Math.random()*items.length)];
    const title = random.querySelector("title")?.textContent || "Latest News";
    const desc = random.querySelector("description")?.textContent || "Content loading...";

    return `<h2 style='text-align:center'>${title}</h2>
            <p style='max-width:700px;margin:15px auto;line-height:1.6;text-align:center'>${desc}</p>`;

  }catch(e){
    // fallback article if API fails
    return `<h2 style='text-align:center'>Latest Online Trends</h2>
            <p style='max-width:700px;margin:15px auto;line-height:1.6;text-align:center'>Content creation and digital marketing continue to grow rapidly. Many creators are leveraging new strategies to reach global audiences and increase engagement.</p>`;
  }
}
}

// ==============================
// GENERATE SINGLE
// ==============================
function generateOne(){
  const url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  let code = uniqueCode();
  while(localStorage.getItem(code)) code = uniqueCode();

  const short = location.origin + location.pathname + '#' + code;

  localStorage.setItem(code, JSON.stringify({url,clicks:0}));

  document.getElementById('result').innerHTML = `<div class='item'>${short}</div>`;
  loadStats();
}

// ==============================
// BULK GENERATE
// ==============================
function generateBulk(){
  const lines = document.getElementById('bulk').value.split("\n").filter(x=>x.trim());
  let html="";

  lines.forEach(url=>{
    let code = uniqueCode();
    while(localStorage.getItem(code)) code = uniqueCode();

    const short = location.origin + location.pathname + '#' + code;

    localStorage.setItem(code, JSON.stringify({url,clicks:0}));

    html += `<div class='item'>${short}</div>`;
  });

  document.getElementById('bulkResult').innerHTML = html;
  loadStats();
}

// ==============================
// STATS
// ==============================
function loadStats(){
  let html="";

  for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);
    const data = JSON.parse(localStorage.getItem(key));

    if(!data || !data.url) continue;

    html += `<div class='item'>${location.origin}/xsafe/#${key} | Clicks: ${data.clicks}</div>`;
  }

  document.getElementById('stats').innerHTML = html;
}

// ==============================
// DASHBOARD
// ==============================
function dashboard(){
  document.getElementById('app').innerHTML = `
    <div class='container'>

      <div class='card'>
        <h2>Single Shortlink</h2>
        <input id='url' placeholder='Enter URL'>
        <button onclick='generateOne()'>Generate</button>
        <div id='result'></div>
      </div>

      <div class='card'>
        <h2>Bulk Shortlink</h2>
        <textarea id='bulk' placeholder='One URL per line'></textarea>
        <button onclick='generateBulk()'>Generate Bulk</button>
        <div id='bulkResult'></div>
      </div>

      <div class='card'>
        <h2>Statistics</h2>
        <div id='stats'></div>
      </div>

    </div>
  `;

  loadStats();
}

// ==============================
// REDIRECT MODE
// ==============================
window.onload = async function(){
  const hash = location.hash.replace('#','');

  if(hash){
    const data = JSON.parse(localStorage.getItem(hash));
    if(!data) return;

    if(isBot()){
      document.body.innerHTML = "<h2>Welcome</h2>";
      return;
    }

    data.clicks++;
    localStorage.setItem(hash, JSON.stringify(data));

    const article = await fetchArticle();

    document.body.innerHTML = `
      <div class='container'>
        <div class='card'>
          ${article}
          <p style='text-align:center'>Loading secure page...</p>
          <p id='count' style='text-align:center'></p>
        </div>
      </div>
    `;

    let t=8;
    const timer=setInterval(()=>{
      const el = document.getElementById('count');
      if(el) el.innerText = "Redirect in " + t + " sec";
      t--;
      if(t < 0){
        clearInterval(timer);
        if(data.url && data.url.startsWith('http')){
          window.location.href = data.url;
        } else {
          alert('Invalid target URL');
        }
      }
    },1000);

    return;
  }

  dashboard();
}

</script>
</body>
</html>
