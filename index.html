<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe GLOBAL FIX</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px;text-align:center}
input,textarea,button{padding:12px;margin:8px;border-radius:10px;border:none}
input,textarea{width:100%}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:10px;word-break:break-all}
img{max-width:100%;border-radius:10px;margin:15px 0}
.loader{margin:20px auto;width:60px;height:60px;border-radius:50%;border:5px solid #1f2937;border-top:5px solid #22c55e;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
</style>
</head>

<body>
<div id="app"></div>

<script>

// ================= CONFIG =================
const PIN = "270491";
const DOMAIN = "https://www.xsafe.biz.id";

// ================= SAFE BASE64 =================
function encodeURL(url){
  return btoa(unescape(encodeURIComponent(url)));
}
function decodeURL(str){
  try{
    return decodeURIComponent(escape(atob(str)));
  }catch{
    return null;
  }
}

// ================= PIN =================
function showPin(){
  document.getElementById('app').innerHTML = `
  <div class='container'>
    <div class='card'>
      <h2>Enter PIN</h2>
      <input id='pinInput' type='password'>
      <button onclick='loginPin()'>Unlock</button>
    </div>
  </div>`;
}

function loginPin(){
  const val = document.getElementById('pinInput').value;
  if(val===PIN){
    localStorage.setItem('xsafe_pin', PIN);
    dashboard();
  } else alert('Wrong PIN');
}

function isLogged(){
  return localStorage.getItem('xsafe_pin')===PIN;
}

// ================= UTIL =================
function normalize(url){
  if(!/^https?:\/\//i.test(url)) return "https://"+url;
  return url;
}

function uniqueCode(){
  return Math.random().toString(36).substring(2,6);
}

function copyText(text){
  navigator.clipboard.writeText(text);
}

// ================= ARTICLE =================
function getArticle(){
  const img = "https://picsum.photos/800/400?"+Date.now();
  return `
  <h2>Video Downloader & Player Guide</h2>
  <img src="${img}">
  <p>
  Modern video downloader and player tools allow users to save and watch content offline efficiently. These tools support multiple formats such as MP4, MKV, and AVI while offering high-definition playback. Advanced features like subtitle synchronization, playback speed control, and hardware acceleration make the experience smoother across all devices including mobile phones and desktops.
  </p>`;
}

// ================= GENERATE =================
function generate(){
  let url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  url = normalize(url);
  const code = uniqueCode();
  const encoded = encodeURL(url);

  const short = DOMAIN + '/#' + code + '|' + encoded;

  document.getElementById('result').innerHTML = `
  <div class='item'>${short}<br>
  <button onclick="copyText('${short}')">Copy</button>
  </div>`;
}

function bulk(){
  const list = document.getElementById('bulk').value.split("\n").filter(x=>x.trim());
  let html="";

  list.forEach(u=>{
    let url = normalize(u);
    const code = uniqueCode();
    const encoded = encodeURL(url);

    const short = DOMAIN + '/#' + code + '|' + encoded;

    html += `<div class='item'>${short}<br><button onclick="copyText('${short}')">Copy</button></div>`;
  });

  document.getElementById('bulkResult').innerHTML = html;
}

// ================= DASHBOARD =================
function dashboard(){
  document.getElementById('app').innerHTML = `
  <div class='container'>

    <div class='card'>
      <h2>Single Shortlink</h2>
      <input id='url' placeholder='Enter URL'>
      <button onclick='generate()'>Generate</button>
      <div id='result'></div>
    </div>

    <div class='card'>
      <h2>Bulk Shortlink</h2>
      <textarea id='bulk'></textarea>
      <button onclick='bulk()'>Generate Bulk</button>
      <div id='bulkResult'></div>
    </div>

  </div>`;
}

// ================= REDIRECT =================
function redirectPage(target){
  const delay = Math.floor(Math.random()*3)+5;

  document.getElementById('app').innerHTML = `
  <div class='container'>
    <div class='card'>
      ${getArticle()}
      <div class='loader'></div>
      <p id='count'></p>
      <a href='https://whatsapp.com/channel/0029VbDTbKN4CrfZ5GOmdY0i' target='_blank'>
        <button>Join WhatsApp</button>
      </a>
    </div>
  </div>`;

  let t=delay;
  const timer=setInterval(()=>{
    document.getElementById('count').innerText = "Redirect in "+t+" sec";
    t--;
    if(t<0){ clearInterval(timer); window.location.replace(target); }
  },1000);
}

// ================= INIT =================
window.onload = function(){
  const hash = location.hash.replace('#','');

  if(hash){
    const parts = hash.split('|');
    const target = decodeURL(parts[1]);

    if(target){
      redirectPage(target);
    } else {
      document.body.innerHTML = "<h2>Invalid Link</h2>";
    }

    return;
  }

  if(isLogged()) dashboard(); else showPin();
}

</script>
</body>
</html>
