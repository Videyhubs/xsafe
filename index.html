<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe Shortlink</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px;text-align:center}
input,textarea,button{padding:12px;margin:8px;border-radius:10px;border:none}
input,textarea{width:100%}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:10px}
img{max-width:100%;border-radius:10px;margin-top:10px}
iframe{margin-top:10px;border-radius:10px}
</style>
</head>

<body>
<div id="app"></div>

<script>

// =========================
// CONFIG DOMAIN
// =========================
const DOMAIN = "https://www.xsafe.biz.id";

// =========================
// PIN SYSTEM
// =========================
const PIN = "270491";
function checkPin(){
  const p = prompt("Enter PIN:");
  if(p !== PIN){
    document.body.innerHTML = "<h2 style='text-align:center'>Access Denied</h2>";
    return false;
  }
  return true;
}

// =========================
// SHORT UNIQUE CODE (SUPER RANDOM)
// =========================
function uniqueCode(){
  const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code = "";
  for(let i=0;i<6;i++){
    code += chars[Math.floor(Math.random()*chars.length)];
  }
  return code;
}

// =========================
// NORMALIZE URL (http/https/www)
// =========================
function normalizeURL(url){
  if(!/^https?:\/\//i.test(url)){
    return "https://" + url;
  }
  return url;
}

// =========================
// BOT DETECT
// =========================
function isBot(){
  return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp|bot/i.test(navigator.userAgent);
}

// =========================
// ARTICLES
// =========================
const articles = [
`<h2>Best Video Downloader Tools in 2026</h2>
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
<p>Downloading videos from the internet has become increasingly popular as users look for ways to watch content offline without interruptions. Modern video downloader tools allow users to save videos in multiple formats and resolutions, including HD and even 4K quality. These tools are designed to be fast, efficient, and easy to use, making them accessible for beginners and professionals alike. Many applications also support batch downloads, allowing users to save multiple videos simultaneously. Security is another important factor, as trusted tools ensure safe downloads without malware or unwanted software. Choosing the right downloader depends on your needs, whether it's speed, format compatibility, or simplicity. Overall, video downloading tools continue to evolve, offering better performance and enhanced features for everyday users.</p>`,

`<h2>Top Video Player Software for Smooth Playback</h2>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/aqz-KE-bpKQ" frameborder="0" allowfullscreen></iframe>
<p>A reliable video player is essential for enjoying multimedia content without lag or compatibility issues. Modern video player software supports a wide range of formats, including MP4, MKV, AVI, and more. Advanced players come with features such as subtitle synchronization, audio enhancement, and hardware acceleration for smoother playback. Many users prefer lightweight players that do not consume excessive system resources while still delivering high-quality visuals. Additionally, customizable interfaces and keyboard shortcuts enhance the overall user experience. Whether for watching movies, streaming content, or playing downloaded videos, having the right player ensures seamless entertainment. As technology advances, video players continue to improve in performance, making them indispensable tools for digital media consumption.</p>`
];

function getArticle(){
  return articles[Math.floor(Math.random()*articles.length)];
}

// =========================
// GENERATE SINGLE
// =========================
function generate(){
  let url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  url = normalizeURL(url);

  let code = uniqueCode();
  while(localStorage.getItem(code)) code = uniqueCode();

  const short = DOMAIN + location.pathname + '#' + code;

  localStorage.setItem(code, JSON.stringify({url,clicks:0}));

  document.getElementById('result').innerHTML = `<div class='item'>${short}</div>`;
  loadStats();
}

// =========================
// BULK
// =========================
function bulk(){
  const list = document.getElementById('bulk').value.split("\n").filter(x=>x.trim());
  let html="";

  list.forEach(u=>{
    let url = normalizeURL(u);

    let code = uniqueCode();
    while(localStorage.getItem(code)) code = uniqueCode();

    const short = DOMAIN + location.pathname + '#' + code;

    localStorage.setItem(code, JSON.stringify({url,clicks:0}));

    html += `<div class='item'>${short}</div>`;
  });

  document.getElementById('bulkResult').innerHTML = html;
  loadStats();
}

// =========================
// STATS
// =========================
function loadStats(){
  let html="";

  for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);
    const data = JSON.parse(localStorage.getItem(key));

    if(!data || !data.url) continue;

    html += `<div class='item'>${DOMAIN}${location.pathname}#${key} | Clicks: ${data.clicks}</div>`;
  }

  document.getElementById('stats').innerHTML = html;
}

// =========================
// DASHBOARD
// =========================
function dashboard(){
  if(!checkPin()) return;

  document.getElementById('app').innerHTML = `
  <div class='container'>

    <div class='card'>
      <h2>Single Shortlink</h2>
      <input id='url' placeholder='Enter URL'>
      <button onclick='generate()'>Generate</button>
      <div id='result'></div>
    </div>

    <div class='card'>
      <h2>Bulk Shortlink</h2>
      <textarea id='bulk' placeholder='One URL per line'></textarea>
      <button onclick='bulk()'>Generate Bulk</button>
      <div id='bulkResult'></div>
    </div>

    <div class='card'>
      <h2>Statistics</h2>
      <div id='stats'></div>
    </div>

  </div>`;

  loadStats();
}

// =========================
// REDIRECT
// =========================
window.onload = function(){
  const hash = location.hash.replace('#','');

  if(hash){
    const data = JSON.parse(localStorage.getItem(hash));
    if(!data) return;

    if(isBot()){
      document.body.innerHTML = "<h2>Welcome</h2>";
      return;
    }

    data.clicks++;
    localStorage.setItem(hash, JSON.stringify(data));

    const article = getArticle();
    const delay = Math.floor(Math.random()*3)+8;

    document.body.innerHTML = `
      <div class='container'>
        <div class='card'>
          ${article}
          <p>Loading secure page...</p>
          <p id='count'></p>
          <a href='https://whatsapp.com/channel/0029VbDTbKN4CrfZ5GOmdY0i' target='_blank'>
            <button>Join WhatsApp Channel</button>
          </a>
        </div>
      </div>
    `;

    let t=delay;
    const timer=setInterval(()=>{
      document.getElementById('count').innerText = "Redirect in " + t + " sec";
      t--;

      if(t<0){
        clearInterval(timer);
        window.location.href = data.url;
      }
    },1000);

    return;
  }

  dashboard();
}

</script>
</body>
</html>
