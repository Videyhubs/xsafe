<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe FINAL FIX</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px;text-align:center}
input,textarea,button{padding:12px;margin:8px;border-radius:10px;border:none}
input,textarea{width:100%}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>
<div id="app"></div>

<script>

// =========================
// UNIQUE CODE
// =========================
function uniqueCode(){
  return Math.random().toString(36).substring(2,10) + Date.now().toString(36);
}

// =========================
// BOT DETECT
// =========================
function isBot(){
  return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp|bot/i.test(navigator.userAgent);
}

// =========================
// FAST ARTICLE (NO API = NO ERROR)
// =========================
function getArticle(){
  const titles = [
    "How to Grow Fast Online",
    "Digital Marketing Secrets",
    "Viral Content Strategy",
    "Make Money Online Easily",
    "Content Creator Success Guide"
  ];

  const text = "In today's digital world, many people are building online income through content creation, social media, and smart marketing strategies. Understanding audience behavior and staying consistent are the keys to long-term success.";

  return `
    <h2>${titles[Math.floor(Math.random()*titles.length)]}</h2>
    <p style='max-width:700px;margin:15px auto;line-height:1.6'>${text}</p>
  `;
}

// =========================
// GENERATE SINGLE
// =========================
function generate(){
  const url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  let code = uniqueCode();
  while(localStorage.getItem(code)) code = uniqueCode();

  const short = location.origin + location.pathname + '#' + code;

  localStorage.setItem(code, JSON.stringify({url,clicks:0}));

  document.getElementById('result').innerHTML = `<div class='item'>${short}</div>`;
  loadStats();
}

// =========================
// BULK
// =========================
function bulk(){
  const list = document.getElementById('bulk').value.split("\n").filter(x=>x.trim());
  let html="";

  list.forEach(url=>{
    let code = uniqueCode();
    while(localStorage.getItem(code)) code = uniqueCode();

    const short = location.origin + location.pathname + '#' + code;

    localStorage.setItem(code, JSON.stringify({url,clicks:0}));

    html += `<div class='item'>${short}</div>`;
  });

  document.getElementById('bulkResult').innerHTML = html;
  loadStats();
}

// =========================
// STATS
// =========================
function loadStats(){
  let html="";

  for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);
    const data = JSON.parse(localStorage.getItem(key));

    if(!data || !data.url) continue;

    html += `<div class='item'>${location.origin}${location.pathname}#${key} | Clicks: ${data.clicks}</div>`;
  }

  document.getElementById('stats').innerHTML = html;
}

// =========================
// DASHBOARD
// =========================
function dashboard(){
  document.getElementById('app').innerHTML = `
  <div class='container'>

    <div class='card'>
      <h2>Single Shortlink</h2>
      <input id='url' placeholder='Enter URL'>
      <button onclick='generate()'>Generate</button>
      <div id='result'></div>
    </div>

    <div class='card'>
      <h2>Bulk Shortlink</h2>
      <textarea id='bulk' placeholder='One URL per line'></textarea>
      <button onclick='bulk()'>Generate Bulk</button>
      <div id='bulkResult'></div>
    </div>

    <div class='card'>
      <h2>Statistics</h2>
      <div id='stats'></div>
    </div>

  </div>`;

  loadStats();
}

// =========================
// REDIRECT
// =========================
window.onload = function(){
  const hash = location.hash.replace('#','');

  if(hash){
    const data = JSON.parse(localStorage.getItem(hash));
    if(!data) return;

    if(isBot()){
      document.body.innerHTML = "<h2>Welcome</h2>";
      return;
    }

    data.clicks++;
    localStorage.setItem(hash, JSON.stringify(data));

    const article = getArticle();

    document.body.innerHTML = `
      <div class='container'>
        <div class='card'>
          ${article}
          <p>Loading secure page...</p>
          <p id='count'></p>
        </div>
      </div>
    `;

    let t=4; // lebih cepat
    const timer=setInterval(()=>{
      document.getElementById('count').innerText = "Redirect in " + t + " sec";
      t--;

      if(t<0){
        clearInterval(timer);
        window.location.href = data.url;
      }
    },1000);

    return;
  }

  dashboard();
}

</script>
</body>
</html>
