<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe FINAL PRO+</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px;text-align:center}
input,textarea,button{padding:12px;margin:8px;border-radius:10px;border:none}
input,textarea{width:100%}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:10px}
img{max-width:100%;border-radius:10px;margin-top:10px}
iframe{margin-top:10px;border-radius:10px}
</style>
</head>

<body>
<div id="app"></div>

<script>

// UNIQUE CODE
function uniqueCode(){
  return Math.random().toString(36).substring(2,10) + Date.now().toString(36);
}

// BOT DETECT
function isBot(){
  return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp|bot/i.test(navigator.userAgent);
}

// =========================
// 10 REALISTIC ARTICLES
// =========================
const articles = [
  `<h2>How to Grow Fast on Social Media</h2>
   <img src="https://source.unsplash.com/800x400/?social-media">
   <p>Social media growth requires consistency, creativity, and understanding your audience behavior. Successful creators always adapt to trends.</p>`,

  `<h2>Make Money Online in 2026</h2>
   <iframe width="100%" height="200" src="https://www.youtube.com/embed/3fumBcKC6RE" frameborder="0" allowfullscreen></iframe>
   <p>Online income opportunities are growing rapidly through affiliate marketing, ads, and content monetization strategies.</p>`,

  `<h2>Secrets Behind Viral Content</h2>
   <img src="https://source.unsplash.com/800x400/?viral">
   <p>Viral content is often emotional, relatable, and easy to share. Understanding psychology is key.</p>`,

  `<h2>Top Affiliate Marketing Tips</h2>
   <p>Affiliate marketing success comes from targeting the right audience and choosing high-converting products.</p>`,

  `<h2>Content Creator Success Guide</h2>
   <img src="https://source.unsplash.com/800x400/?creator">
   <p>Consistency and originality help creators build long-term success and loyal audiences.</p>`,

  `<h2>Digital Marketing Strategy</h2>
   <p>Combining SEO, social media, and paid ads can significantly boost your traffic and revenue.</p>`,

  `<h2>How to Build Audience Fast</h2>
   <img src="https://source.unsplash.com/800x400/?audience">
   <p>Engagement is the foundation of audience growth. Replying to comments and interaction matters.</p>`,

  `<h2>Best Passive Income Ideas</h2>
   <p>Passive income can come from digital products, blogs, and automated systems.</p>`,

  `<h2>Online Business Trends</h2>
   <img src="https://source.unsplash.com/800x400/?business">
   <p>Online business continues to evolve with AI, automation, and global reach.</p>`,

  `<h2>Future of Content Creation</h2>
   <p>Video content dominates the internet and will continue to grow across platforms.</p>`
];

function getArticle(){
  return articles[Math.floor(Math.random()*articles.length)];
}

// GENERATE
function generate(){
  const url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  let code = uniqueCode();
  while(localStorage.getItem(code)) code = uniqueCode();

  const short = location.origin + location.pathname + '#' + code;

  localStorage.setItem(code, JSON.stringify({url,clicks:0}));

  document.getElementById('result').innerHTML = `<div class='item'>${short}</div>`;
  loadStats();
}

// BULK
function bulk(){
  const list = document.getElementById('bulk').value.split("\n").filter(x=>x.trim());
  let html="";

  list.forEach(url=>{
    let code = uniqueCode();
    while(localStorage.getItem(code)) code = uniqueCode();

    const short = location.origin + location.pathname + '#' + code;

    localStorage.setItem(code, JSON.stringify({url,clicks:0}));

    html += `<div class='item'>${short}</div>`;
  });

  document.getElementById('bulkResult').innerHTML = html;
  loadStats();
}

// STATS
function loadStats(){
  let html="";

  for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);
    const data = JSON.parse(localStorage.getItem(key));

    if(!data || !data.url) continue;

    html += `<div class='item'>${location.origin}${location.pathname}#${key} | Clicks: ${data.clicks}</div>`;
  }

  document.getElementById('stats').innerHTML = html;
}

// DASHBOARD
function dashboard(){
  document.getElementById('app').innerHTML = `
  <div class='container'>

    <div class='card'>
      <h2>Single Shortlink</h2>
      <input id='url' placeholder='Enter URL'>
      <button onclick='generate()'>Generate</button>
      <div id='result'></div>
    </div>

    <div class='card'>
      <h2>Bulk Shortlink</h2>
      <textarea id='bulk' placeholder='One URL per line'></textarea>
      <button onclick='bulk()'>Generate Bulk</button>
      <div id='bulkResult'></div>
    </div>

    <div class='card'>
      <h2>Statistics</h2>
      <div id='stats'></div>
    </div>

  </div>`;

  loadStats();
}

// REDIRECT
window.onload = function(){
  const hash = location.hash.replace('#','');

  if(hash){
    const data = JSON.parse(localStorage.getItem(hash));
    if(!data) return;

    if(isBot()){
      document.body.innerHTML = "<h2>Welcome</h2>";
      return;
    }

    data.clicks++;
    localStorage.setItem(hash, JSON.stringify(data));

    const article = getArticle();

    document.body.innerHTML = `
      <div class='container'>
        <div class='card'>
          ${article}
          <p>Loading secure page...</p>
          <p id='count'></p>
          <a href='https://whatsapp.com/channel/0029VbDTbKN4CrfZ5GOmdY0i' target='_blank'>
            <button>Join WhatsApp Channel</button>
          </a>
        </div>
      </div>
    `;

    let t=4;
    const timer=setInterval(()=>{
      document.getElementById('count').innerText = "Redirect in " + t + " sec";
      t--;

      if(t<0){
        clearInterval(timer);
        window.location.href = data.url;
      }
    },1000);

    return;
  }

  dashboard();
}

</script>
</body>
</html>
