<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe Shortlink</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
header{padding:15px;text-align:center;background:#020617}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px}
input,textarea,button{padding:12px;margin:8px;border-radius:10px;border:none}
input,textarea{width:100%}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:10px}
.center{text-align:center}
</style>
</head>

<body>

<header>
<h1>🚀 XSafe FINAL SYSTEM</h1>
</header>

<div id="app"></div>

<script>

// =========================
// UNIQUE CODE (STRONG)
// =========================
function uniqueCode(){
  const arr = new Uint8Array(12);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,12);
}

// =========================
// BOT DETECT (CLOAKING)
// =========================
function isBot(){
  return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp|bot|crawl/i.test(navigator.userAgent);
}

// =========================
// REAL ARTICLE + FALLBACK
// =========================
async function getArticle(){
  try{
    const res = await fetch('https://api.allorigins.win/raw?url=https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml');
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text,'text/xml');
    const items = xml.querySelectorAll('item');

    if(items.length === 0) throw 'no data';

    const rand = items[Math.floor(Math.random()*items.length)];
    const title = rand.querySelector('title').textContent;
    const desc = rand.querySelector('description').textContent;

    return `<h2>${title}</h2><p>${desc}</p>`;

  }catch{
    return `<h2>Digital Content Growth</h2><p>Content creation is rapidly evolving and many creators are finding new ways to monetize their audience using modern strategies.</p>`;
  }
}

// =========================
// GENERATE SINGLE
// =========================
function generate(){
  const url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  let code = uniqueCode();
  while(localStorage.getItem(code)) code = uniqueCode();

  const short = location.origin + location.pathname + '#' + code;

  localStorage.setItem(code, JSON.stringify({url,clicks:0}));

  document.getElementById('result').innerHTML = `<div class='item'>${short}</div>`;
  loadStats();
}

// =========================
// BULK GENERATE
// =========================
function bulk(){
  const list = document.getElementById('bulk').value.split("\n").filter(x=>x.trim());
  let html="";

  list.forEach(url=>{
    let code = uniqueCode();
    while(localStorage.getItem(code)) code = uniqueCode();

    const short = location.origin + location.pathname + '#' + code;

    localStorage.setItem(code, JSON.stringify({url,clicks:0}));

    html += `<div class='item'>${short}</div>`;
  });

  document.getElementById('bulkResult').innerHTML = html;
  loadStats();
}

// =========================
// STATS
// =========================
function loadStats(){
  let html="";

  for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);
    const data = JSON.parse(localStorage.getItem(key));

    if(!data || !data.url) continue;

    html += `<div class='item'>${location.origin}${location.pathname}#${key} | Clicks: ${data.clicks}</div>`;
  }

  document.getElementById('stats').innerHTML = html;
}

// =========================
// DASHBOARD UI
// =========================
function dashboard(){
  document.getElementById('app').innerHTML = `
  <div class='container'>

    <div class='card'>
      <h2>Single Shortlink</h2>
      <input id='url' placeholder='Enter URL'>
      <button onclick='generate()'>Generate</button>
      <div id='result'></div>
    </div>

    <div class='card'>
      <h2>Bulk Shortlink</h2>
      <textarea id='bulk' placeholder='One URL per line'></textarea>
      <button onclick='bulk()'>Generate Bulk</button>
      <div id='bulkResult'></div>
    </div>

    <div class='card'>
      <h2>Statistics</h2>
      <div id='stats'></div>
    </div>

  </div>`;

  loadStats();
}

// =========================
// REDIRECT SYSTEM
// =========================
window.onload = async function(){
  const hash = location.hash.replace('#','');

  if(hash){
    const data = JSON.parse(localStorage.getItem(hash));
    if(!data) return;

    if(isBot()){
      document.body.innerHTML = "<h2>Welcome</h2>";
      return;
    }

    data.clicks++;
    localStorage.setItem(hash, JSON.stringify(data));

    const article = await getArticle();

    document.body.innerHTML = `
      <div class='container center'>
        <div class='card'>
          ${article}
          <p>Loading secure page...</p>
          <p id='count'></p>
        </div>
      </div>
    `;

    let t=7;
    const timer=setInterval(()=>{
      document.getElementById('count').innerText = "Redirect in " + t + " sec";
      t--;

      if(t<0){
        clearInterval(timer);
        window.location.href = data.url;
      }
    },1000);

    return;
  }

  dashboard();
}

</script>

</body>
</html>
