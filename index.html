<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe ULTRA PROTECT</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff;user-select:none}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px;text-align:center}
input,textarea,button{padding:12px;margin:8px;border-radius:10px;border:none}
input,textarea{width:100%}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:10px}
img{max-width:100%;border-radius:10px;margin-top:10px}
iframe{margin-top:10px;border-radius:10px}
.loader{
  border:5px solid #1f2937;
  border-top:5px solid #22c55e;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}
@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
</style>
</head>

<body oncontextmenu="return false">
<div id="app"></div>

<script>

// BASIC OBFUSCATION
const _d = atob("aHR0cHM6Ly93d3cueHNhZmUuYml6Lmlk");
const _p = atob("MjcwNDkx");

// ANTI COPY + DEVTOOLS
window.addEventListener('keydown',function(e){
  if(e.ctrlKey && ['u','c','x','s','i','j'].includes(e.key.toLowerCase())) e.preventDefault();
});

setInterval(()=>{
  const devtools = window.outerWidth - window.innerWidth > 160;
  if(devtools){ document.body.innerHTML="<h2>Blocked</h2>"; }
},1000);

// ANTI ADBLOCK (simple detect)
function antiAdblock(){
  const bait=document.createElement('div');
  bait.className='adsbox';
  document.body.appendChild(bait);
  setTimeout(()=>{
    if(bait.offsetHeight===0){
      alert('Disable Adblock to continue');
      location.reload();
    }
    bait.remove();
  },100);
}

// UNIQUE CODE SHORT
function code(){
  return Math.random().toString(36).substring(2,8);
}

function norm(u){
  return /^https?:\/\//i.test(u)?u:"https://"+u;
}

function isBot(){
  return /bot|facebook|whatsapp|instagram/i.test(navigator.userAgent);
}

// MANY ARTICLES
const A = [];
for(let i=0;i<10;i++){
  A.push(`<h2>Best Video Downloader & Player Guide ${i+1}</h2>
  <img src="https://source.unsplash.com/800x400/?video,tech,${i}">
  <p>Modern video downloading and playback tools are essential for digital users who want flexibility and performance. These applications support multiple formats, high-definition playback, and efficient downloading systems. With advanced features such as subtitle integration, streaming compatibility, and hardware acceleration, users can enjoy smooth experiences across devices. Security is also improved, ensuring downloads are safe and protected. Many tools now offer cross-platform functionality, meaning they work seamlessly on desktop and mobile. By choosing the right combination of downloader and player, users can maximize productivity and entertainment while maintaining quality and performance in everyday usage.</p>`);
}

function article(){ return A[Math.floor(Math.random()*A.length)]; }

// GENERATE
function gen(){
  let u=document.getElementById('url').value;
  if(!u) return alert('Enter URL');
  u=norm(u);
  let c=code();
  while(localStorage.getItem(c)) c=code();
  const s=_d+location.pathname+'#'+c;
  localStorage.setItem(c,JSON.stringify({url:u,clicks:0}));
  document.getElementById('result').innerHTML=`<div class='item'>${s}</div>`;
  stats();
}

function bulk(){
  const list=document.getElementById('bulk').value.split("\n").filter(x=>x.trim());
  let h="";
  list.forEach(u=>{
    u=norm(u);
    let c=code();
    while(localStorage.getItem(c)) c=code();
    const s=_d+location.pathname+'#'+c;
    localStorage.setItem(c,JSON.stringify({url:u,clicks:0}));
    h+=`<div class='item'>${s}</div>`;
  });
  document.getElementById('bulkResult').innerHTML=h;
  stats();
}

function stats(){
  let h="";
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    const d=JSON.parse(localStorage.getItem(k));
    if(!d||!d.url) continue;
    h+=`<div class='item'>${_d}${location.pathname}#${k} | Clicks: ${d.clicks}</div>`;
  }
  document.getElementById('stats').innerHTML=h;
}

function dash(){
  const p=prompt('Enter PIN');
  if(p!==_p){ document.body.innerHTML="<h2>Denied</h2>"; return; }

  document.getElementById('app').innerHTML=`
  <div class='container'>
    <div class='card'>
      <h2>Single</h2>
      <input id='url'>
      <button onclick='gen()'>Generate</button>
      <div id='result'></div>
    </div>
    <div class='card'>
      <h2>Bulk</h2>
      <textarea id='bulk'></textarea>
      <button onclick='bulk()'>Generate</button>
      <div id='bulkResult'></div>
    </div>
    <div class='card'>
      <h2>Stats</h2>
      <div id='stats'></div>
    </div>
  </div>`;
  stats();
}

window.onload=function(){
  antiAdblock();
  const h=location.hash.replace('#','');

  if(h){
    const d=JSON.parse(localStorage.getItem(h));
    if(!d) return;

    if(isBot()){
      document.body.innerHTML="<h2>Welcome</h2>";
      return;
    }

    d.clicks++;
    localStorage.setItem(h,JSON.stringify(d));

    const delay=Math.floor(Math.random()*3)+8;

    document.body.innerHTML=`
      <div class='container'>
        <div class='card'>
          ${article()}
          <div class='loader'></div>
          <p id='c'></p>
          <a href='https://whatsapp.com/channel/0029VbDTbKN4CrfZ5GOmdY0i' target='_blank'>
            <button>Join WhatsApp Channel</button>
          </a>
        </div>
      </div>`;

    let t=delay;
    const timer=setInterval(()=>{
      document.getElementById('c').innerText="Redirect in "+t+" sec";
      t--;
      if(t<0){ clearInterval(timer); location.href=d.url; }
    },1000);

    return;
  }

  dash();
}

</script>
</body>
</html>
