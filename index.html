<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe ULTRA PRO+</title>

<style>
body { margin:0; font-family:Arial; background:linear-gradient(135deg,#020617,#0f172a); color:#fff; }
header { padding:15px; text-align:center; background:#020617; position:sticky; top:0; }
.container { padding:20px; max-width:1000px; margin:auto; }
.card { background:#1e293b; padding:20px; border-radius:20px; margin-top:20px; box-shadow:0 10px 30px rgba(0,0,0,0.6); }
input, select, button { padding:12px; margin:8px; border-radius:12px; border:none; }
input { width:65%; }
button { background:#22c55e; color:white; cursor:pointer; font-weight:bold; transition:0.3s; }
button:hover { transform:scale(1.05); }
.lang { float:right; }
.article-box { text-align:left; line-height:1.6; }
</style>
</head>

<body>

<header>
<h1>🚀 XSafe ULTRA PRO+</h1>
<select class="lang" onchange="setLang(this.value)">
<option value="en">English</option>
<option value="id">Indonesia</option>
<option value="es">Español</option>
<option value="fr">Français</option>
</select>
</header>

<div class="container" id="app"></div>

<script>

// ==============================
// LANGUAGE SYSTEM
// ==============================
const langData = {
  en: { title:"Create Safe Link", placeholder:"Enter URL", btn:"Generate", wait:"Loading secure content...", redirect:"Redirect in" },
  id: { title:"Buat Link Aman", placeholder:"Masukkan URL", btn:"Generate", wait:"Memuat konten aman...", redirect:"Redirect dalam" },
  es: { title:"Crear enlace seguro", placeholder:"Ingrese URL", btn:"Generar", wait:"Cargando contenido...", redirect:"Redirigiendo en" },
  fr: { title:"Créer un lien sécurisé", placeholder:"Entrer URL", btn:"Générer", wait:"Chargement...", redirect:"Redirection dans" }
};

let currentLang = 'en';

function setLang(l){
  currentLang = l;
  dashboard();
}


// ==============================
// AUTO ARTICLE GENERATOR (LONG)
// ==============================
function generateArticle(){
  const titles = [
    "How to Grow Fast on Social Media",
    "Top Online Income Strategies",
    "Secrets of Viral Content",
    "Best Affiliate Marketing Tricks",
    "How Creators Go Viral Instantly"
  ];

  const paragraphs = [
    "In today's digital world, content creation has become one of the most powerful ways to generate income and build influence.",
    "Many successful creators follow proven strategies that focus on engagement, consistency, and audience psychology.",
    "Understanding trends and adapting quickly is the key to staying ahead in competitive platforms like TikTok and Facebook.",
    "Monetization opportunities are growing rapidly, allowing anyone to earn through ads, affiliate links, and sponsorships.",
    "Building trust with your audience will significantly increase your long-term success and revenue potential."
  ];

  let article = `<h2>${titles[Math.floor(Math.random()*titles.length)]}</h2>`;

  for(let i=0;i<5;i++){
    article += `<p>${paragraphs[Math.floor(Math.random()*paragraphs.length)]}</p>`;
  }

  return article;
}


// ==============================
// UNIQUE CODE GENERATOR
// ==============================
function uniqueCode(url){
  return btoa(url + Date.now() + Math.random() + navigator.userAgent)
    .replace(/[^a-zA-Z0-9]/g,'')
    .substring(0,14);
}


// ==============================
// DASHBOARD UI
// ==============================
function dashboard(){
  const t = langData[currentLang];

  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>${t.title}</h2>
      <input id="url" placeholder="${t.placeholder}">
      <button onclick="generateLink()">${t.btn}</button>
      <div id="result"></div>
    </div>

    <div class="card">
      <h2>📊 Statistics</h2>
      <div id="stats"></div>
    </div>
  `;

  loadStats();
}


// ==============================
// GENERATE LINK
// ==============================
function generateLink(){
  const url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  const code = uniqueCode(url);
  const short = window.location.origin + '/xsafe/#' + code;

  localStorage.setItem(code, JSON.stringify({
    url:url,
    clicks:0,
    created:new Date().toLocaleString()
  }));

  document.getElementById('result').innerHTML = `<p>${short}</p>`;
  loadStats();
}


// ==============================
// LOAD STATS
// ==============================
function loadStats(){
  let html="";

  for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);
    const data = JSON.parse(localStorage.getItem(key));

    if(!data || !data.url) continue;

    html += `
      <div class="card">
        <p><b>Short:</b> ${window.location.origin}/xsafe/#${key}</p>
        <p><b>Clicks:</b> ${data.clicks}</p>
        <p><b>Date:</b> ${data.created}</p>
      </div>
    `;
  }

  document.getElementById('stats').innerHTML = html;
}


// ==============================
// BOT DETECTION
// ==============================
function isBot(){
  return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
}


// ==============================
// REDIRECT SYSTEM (ENHANCED)
// ==============================
window.onload = function(){

  const hash = window.location.hash.replace('#','');

  if(hash){
    const data = JSON.parse(localStorage.getItem(hash));
    if(!data) return;

    if(isBot()){
      document.body.innerHTML = "<h2>Content unavailable</h2>";
      return;
    }

    data.clicks++;
    localStorage.setItem(hash, JSON.stringify(data));

    const article = generateArticle();

    document.body.innerHTML = `
      <div class="container">
        <div class="card article-box">
          ${article}
          <p>${langData[currentLang].wait}</p>
          <p id="count"></p>
        </div>
      </div>
    `;

    let t = 7;
    const timer = setInterval(()=>{
      document.getElementById('count').innerText = langData[currentLang].redirect + " " + t + " sec";
      t--;

      if(t < 0){
        clearInterval(timer);
        window.location.href = data.url;
      }
    },1000);

    return;
  }

  dashboard();
}

</script>

</body>
</html>
