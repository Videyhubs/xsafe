<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSafe PRO MAX FIXED</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px;text-align:center}
input,textarea,button{padding:12px;margin:8px;border-radius:10px;border:none}
input,textarea{width:100%}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:10px;word-break:break-all}
img{max-width:100%;border-radius:10px;margin:15px 0}

.centerBox{display:flex;flex-direction:column;align-items:center;justify-content:center}

.loader{width:60px;height:60px;border-radius:50%;border:5px solid #1f2937;border-top:5px solid #22c55e;animation:spin 1s linear infinite;margin:15px auto}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

.pulse{animation:pulse 1.2s infinite}
@keyframes pulse{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}
</style>
</head>

<body>
<div id="app"></div>

<script>

// SECURITY LIGHT (mobile safe)
document.addEventListener('contextmenu',e=>e.preventDefault());

// CONFIG
const PIN="270491";
const DOMAIN="https://www.xsafe.biz.id";

// PIN
function showPin(){
  app.innerHTML=`<div class='container'><div class='card'><h2>Enter PIN</h2><input id='pinInput' type='password'><button onclick='loginPin()'>Unlock</button></div></div>`;
}
function loginPin(){
  if(pinInput.value===PIN){localStorage.setItem('xsafe_pin',PIN);dashboard();}
  else alert('Wrong PIN');
}
function isLogged(){return localStorage.getItem('xsafe_pin')===PIN}

// UTIL
function normalize(u){return /^https?:\/\//i.test(u)?u:"https://"+u}
function uniqueCode(){return Math.random().toString(36).substring(2,7)}
function copyText(t){navigator.clipboard.writeText(t)}

// ARTICLES (fast + real image)
function getArticle(){
  const img=`https://picsum.photos/800/400?random=${Math.floor(Math.random()*10000)}`;
  return `
  <h2>Best Video Downloader & Player</h2>
  <img src="${img}">
  <p>
  Video downloader and player software are essential tools for modern users who want full control over their media experience. These tools allow fast downloads, smooth playback, and support for multiple formats including MP4, MKV, and high-definition videos. Many applications now include advanced features such as subtitle support, playback speed control, and hardware acceleration to ensure a seamless experience across devices. Choosing the right tool can significantly improve how you consume content online, especially when dealing with large video files or streaming platforms.
  </p>`;
}

// GENERATE
function generate(){
  let url=normalize(document.getElementById('url').value);
  if(!url) return alert('Enter URL');

  let code=uniqueCode();
  while(localStorage.getItem(code)) code=uniqueCode();

  const short=DOMAIN+location.pathname+'#'+code;
  localStorage.setItem(code,JSON.stringify({url,clicks:0}));

  result.innerHTML=`<div class='item'>${short}<br><button onclick="copyText('${short}')">Copy</button></div>`;
}

// BULK
function bulk(){
  const list=bulkInput.value.split("\n").filter(x=>x.trim());
  let html="";

  list.forEach(u=>{
    let url=normalize(u);
    let code=uniqueCode();
    while(localStorage.getItem(code)) code=uniqueCode();

    const short=DOMAIN+location.pathname+'#'+code;
    localStorage.setItem(code,JSON.stringify({url,clicks:0}));

    html+=`<div class='item'>${short}<br><button onclick="copyText('${short}')">Copy</button></div>`;
  });

  bulkResult.innerHTML=html;
}

// DASHBOARD
function dashboard(){
  app.innerHTML=`
  <div class='container'>
    <div class='card'>
      <h2>Single</h2>
      <input id='url'>
      <button onclick='generate()'>Generate</button>
      <div id='result'></div>
    </div>

    <div class='card'>
      <h2>Bulk</h2>
      <textarea id='bulkInput'></textarea>
      <button onclick='bulk()'>Generate</button>
      <div id='bulkResult'></div>
    </div>
  </div>`;
}

// REDIRECT (mobile FIX)
function redirectPage(data){
  const delay=Math.floor(Math.random()*3)+8;

  app.innerHTML=`
  <div class='container'>
    <div class='card'>
      ${getArticle()}
      <div class='centerBox'>
        <div class='loader'></div>
        <p id='count' class='pulse'></p>
        <button onclick="goNow('${data.url}')">Continue</button>
        <a href='https://whatsapp.com/channel/0029VbDTbKN4CrfZ5GOmdY0i' target='_blank'><button>Join WhatsApp</button></a>
      </div>
    </div>
  </div>`;

  let t=delay;
  const timer=setInterval(()=>{
    count.innerText="Redirect in "+t+" sec";
    t--;
    if(t<0){clearInterval(timer);goNow(data.url);} 
  },800);
}

function goNow(url){
  window.location.href=url;
  setTimeout(()=>{window.location.assign(url)},300);
}

// INIT
window.onload=function(){
  const hash=location.hash.replace('#','');

  if(hash){
    const data=JSON.parse(localStorage.getItem(hash));
    if(data) redirectPage(data);
    return;
  }

  if(isLogged()) dashboard(); else showPin();
}

</script>
</body>
</html>
