<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XSafe Pro Shortlink</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    input {
      width: 70%;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <h1>🚀 XSafe PRO Shortlink</h1>
  <p>Smart & Safe Links for Social Media (Facebook / Reels / TikTok)</p>

  <div class="box">
    <input id="url" placeholder="Enter your long URL here...">
    <br>
    <button onclick="generateLink()">Generate Safe Link</button>
    <div id="result"></div>
  </div>

  <script>

  // ==============================
  // GENERATE SHORTLINK
  // ==============================
  function generateLink(){
    const url = document.getElementById('url').value;
    if(!url) return alert('Please enter a URL');

    const code = btoa(url + Date.now()).substring(0,10);
    const short = window.location.origin + '/xsafe/#' + code;

    localStorage.setItem(code, JSON.stringify({
      url: url,
      clicks: 0
    }));

    document.getElementById('result').innerHTML = `
      <p>Your Safe Link:</p>
      <input value="${short}" readonly>
    `;
  }


  // ==============================
  // BOT DETECTION (ANTI FACEBOOK)
  // ==============================
  function isBot(){
    return /facebookexternalhit|Facebot|FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
  }


  // ==============================
  // RANDOM CONTENT (SAFE MASKING)
  // ==============================
  const fakeArticles = [
    "Top Viral Tips for TikTok Growth 2026",
    "How Creators Make Money from Reels",
    "Secret Strategy to Go Viral Fast",
    "Best Content Ideas That Explode Views",
    "How to Monetize Traffic Easily"
  ];


  // ==============================
  // REDIRECT SYSTEM
  // ==============================
  window.onload = function(){
    const hash = window.location.hash.replace('#','');

    if(hash){
      const data = JSON.parse(localStorage.getItem(hash));

      if(!data) return;

      // BOT PROTECTION
      if(isBot()){
        document.body.innerHTML = "<h2>Content not available</h2>";
        return;
      }

      // INCREASE CLICK COUNT
      data.clicks++;
      localStorage.setItem(hash, JSON.stringify(data));

      // SHOW FAKE CONTENT
      const randomText = fakeArticles[Math.floor(Math.random() * fakeArticles.length)];

      document.body.innerHTML = `
        <div class="box">
          <h2>${randomText}</h2>
          <p>Please wait... preparing secure page</p>
          <p id="countdown"></p>
        </div>
      `;

      // COUNTDOWN DELAY
      let time = 7;
      const countdown = setInterval(()=>{
        document.getElementById('countdown').innerText = "Redirect in " + time + " seconds...";
        time--;

        if(time < 0){
          clearInterval(countdown);
          window.location.href = data.url;
        }
      },1000);
    }
  }

  </script>
