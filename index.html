function getRandomAlt(){ return ALT_TEXTS[Math.floor(Math.random()*ALT_TEXTS.length)]; }
function getRandomEmoji(){ return EMOJIS[Math.floor(Math.random()*EMOJIS.length)]; }
function shuffleArray(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function normalize(url){ return /^https?:\/\//i.test(url) ? url : "https://" + url; }
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    alert("Copied ✔");
  });
}

function getRedirectTime(){
  const saved = parseInt(localStorage.getItem("redirect_time"),10);
  return Number.isFinite(saved) && saved >= 1 ? saved : 3;
}

function saveRedirectTime(){
  const input = document.getElementById("redirectTime");
  const val = parseInt(input.value,10);
  if (!Number.isFinite(val) || val < 1) {
    alert("Minimum 1 second");
    input.value = getRedirectTime();
    return;
  }
  localStorage.setItem("redirect_time", String(val));
  alert("Cooldown saved: " + val + " sec");
}

function generateRandomString(length = 6){
  return Math.random().toString(36).substring(2, 2 + length);
}

async function randomCode(){
  let code, exists = true;
  while (exists) {
    code = generateRandomString(6);
    const snap = await db.ref("links/" + code).once("value");
    exists = snap.exists();
  }
  return code;
}

function login(){
  const pinInput = document.getElementById("pin");
  if(pinInput.value === PIN){
    localStorage.setItem("pin", PIN);
    dashboard();
  } else alert("Wrong PIN");
}
function isLogin(){ return localStorage.getItem("pin") === PIN; }

function showPin(){
  app.innerHTML = `<div class="container"><div class="card"><h2>Enter PIN</h2><input id="pin" type="password"><button onclick="login()">Unlock</button></div></div>`;
}

async function saveHistory(code,url){
  await db.ref("history/"+code).set({ code, url, clicks:0, createdAt:new Date().toLocaleString() });
}

function deleteHistory(code){
  if(!confirm("Delete this history?")) return;
  db.ref("history/"+code).remove().then(()=>{ db.ref("links/"+code).remove(); loadAnalysis(); });
}

function clearAllHistory(){
  if(!confirm("Delete all history?")) return;
  Promise.all([db.ref("history").remove(), db.ref("links").remove()]).then(loadAnalysis);
}

function updateClick(code){
  db.ref("history/"+code).transaction(data=>{
    if(data) data.clicks = (data.clicks || 0) + 1;
    return data;
  });
}

async function createShort(url){
  const code = await randomCode();
  await db.ref("links/"+code).set({url});
  await saveHistory(code,url);
  return `${DOMAIN}/#${code}`;
}

async function generate(){
  let url = document.getElementById("xsafeput").value.trim();
  if(!url) return alert("Enter URL");
  url = normalize(url);

  const shortMain = await createShort(url);
  const shortAuto = await createShort(AUTO_SHORT_URL);
  const results = shuffleArray([
  const emoji = getRandomEmoji();
  const altText = getRandomAlt();
  
  const formatted = `${emoji} ${shortMain}\n\n${altText}\n${shortAuto}`;

  document.getElementById("result").innerHTML = `
    <div class="item">
      ${formatted.replace(/\n/g,"<br>")}
<button onclick="copyText(${JSON.stringify(formatted)})">Copy All</button>
      </div>
    </div>`;
  loadAnalysis();
}

async function bulk(){
  const lines = document.getElementById("bulkInput").value.split("\n").filter(x=>x.trim());
  let html = "";
  for (const link of lines) {
    const shortMain = await createShort(normalize(link));
    const shortAuto = await createShort(AUTO_SHORT_URL);
    const results = shuffleArray([
      `${getRandomEmoji()} ${shortMain}`,
      `${getRandomEmoji()} ${shortAuto}`
    ]);
    html += `<div class="item">${results.join("<br><br>")}</div>`;
  }
  document.getElementById("bulkResult").innerHTML = html;
  loadAnalysis();
}

function loadAnalysis(){
  db.ref("history").once("value").then(snap=>{
    const data = snap.val() || {};
    let totalLinks = 0, totalClicks = 0, historyHTML = "";
    Object.values(data).forEach(item=>{
      totalLinks++;
      totalClicks += item.clicks || 0;
      historyHTML += `<div class="item"><strong>${DOMAIN}/#${item.code}</strong><p>Clicks: ${item.clicks || 0}</p><p>${item.createdAt}</p><div class="actions"><button onclick="copyText('${DOMAIN}/#${item.code}')">Copy</button><button class="delete-btn" onclick="deleteHistory('${item.code}')">Delete</button></div></div>`;
    });
    document.getElementById("analysis").innerHTML = `<div class="grid"><div class="card"><div class="stat">${totalLinks}</div><div class="small">Total Links</div></div><div class="card"><div class="stat">${totalClicks}</div><div class="small">Total Clicks</div></div></div><div class="card"><h2>History</h2><button class="delete-btn" onclick="clearAllHistory()">Clear All History</button>${historyHTML || '<p>No history yet</p>'}</div>`;
  });
}

function dashboard(){
  app.innerHTML = `<div class="container"><div class="card"><h2>Create Shortlink</h2><input id="xsafeput" placeholder="Enter URL"><button onclick="generate()">Generate</button><div id="result"></div></div><div class="card"><h2>Bulk Generator</h2><textarea id="bulkInput" rows="5"></textarea><button onclick="bulk()">Generate Bulk</button><div id="bulkResult"></div></div><div class="card"><h2>Redirect Cooldown Settings</h2><input id="redirectTime" type="number" min="1" value="${getRedirectTime()}"><button onclick="saveRedirectTime()">Save</button></div><div id="analysis"></div></div>`;
  loadAnalysis();
}

function redirectPage(target,code){
  if(!target){ app.innerHTML = "<h2 style='text-align:center'>Invalid URL</h2>"; return; }
  updateClick(code);
  let sec = getRedirectTime();
  const article = typeof getRandomArticle === 'function' ? getRandomArticle() : null;

  app.innerHTML = `<div class="container"><div class="card">${article ? `<div class="article"><small>${article.category.toUpperCase()} • ${article.publishDate} • ${article.author} • ${article.readTime}</small><h2>${article.title}</h2><small>/${article.slug}</small><p><i>${article.metaDescription}</i></p><img src="https://picsum.photos/900/400?${Date.now()}">${article.content}<div class="sticky-cta"><a href="https://whatsapp.com/channel/0029VbDTbKN4CrfZ5GOmdY0i" target="_blank"><button>Join WhatsApp Channel</button></a></div></div>` : ''}<div class="center"><div class="loader"></div><p id="count">Redirect in ${sec} sec</p></div></div></div>`;

  const timer = setInterval(()=>{
    sec--;
    const countEl = document.getElementById("count");
    if(countEl) countEl.innerText = "Redirect in " + sec + " sec";
    if(sec <= 0){
      clearInterval(timer);
      window.location.href = target;
    }
  },1000);
}

window.onload = ()=>{
  const code = location.hash.replace("#","");
  if(code){
    db.ref("links/"+code).once("value").then(snap=>{
      const data = snap.val();
      if(data && data.url) redirectPage(data.url,code);
      else app.innerHTML = "<h2 style='text-align:center'>Link not found</h2>";
    });
    return;
  }
  if(isLogin()) dashboard(); else showPin();
}
